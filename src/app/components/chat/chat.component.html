<div
  class="chat-panel w-full h-full flex flex-col bg-slate-900/70 border border-slate-800 rounded-2xl overflow-hidden shadow-lg"
>
  <!-- Header Title -->
  <div class="px-4 py-3 bg-slate-800 border-b border-slate-700 flex items-center justify-between">
    <span class="text-sm font-semibold text-slate-300 flex items-center gap-1.5">
      <span>💬</span> Trò chuyện & Dự đoán
    </span>
    <span class="text-xs text-slate-400 font-mono">{{ messages.length }} tin nhắn</span>
  </div>

  <!-- Messages List -->
  <div
    #chatScrollContainer
    class="flex-1 p-4 overflow-y-auto space-y-3 scrollbar-thin scrollbar-thumb-slate-800 scrollbar-track-transparent"
  >
    <div
      *ngFor="let msg of messages"
      [ngClass]="{
        'bg-slate-950/40 border-l-4 border-slate-700': !msg.isSystem && !msg.isCorrectGuess,
        'bg-emerald-950/20 text-emerald-400 border border-emerald-900/50 rounded-xl':
          msg.isSystem &&
          !msg.isCorrectGuess &&
          !msg.text.includes('Game Over') &&
          !msg.text.includes('winner'),
        'bg-yellow-950/30 text-yellow-300 border border-yellow-900/50 rounded-xl font-bold':
          msg.isCorrectGuess || msg.text.includes('Guessed'),
        'bg-gradient-to-r from-purple-950/40 to-indigo-950/40 border border-indigo-900/50 text-indigo-200 rounded-xl text-center font-bold p-2':
          msg.text.includes('Game Over') || msg.text.includes('winner'),
      }"
      class="p-2.5 rounded-lg text-sm leading-relaxed transition-all"
    >
      <!-- System Message -->
      <div
        *ngIf="msg.isSystem && !msg.isCorrectGuess"
        class="flex items-center gap-1.5 justify-center"
      >
        <span>📢</span>
        <span>{{ msg.text }}</span>
      </div>

      <!-- Correct Guess Notice -->
      <div *ngIf="msg.isCorrectGuess" class="flex items-center gap-1.5">
        <span>🌟</span>
        <span
          ><strong>{{ msg.playerName }}</strong> {{ msg.text }}</span
        >
      </div>

      <!-- Normal Guess Message -->
      <div *ngIf="!msg.isSystem && !msg.isCorrectGuess" class="flex items-baseline gap-2">
        <span class="font-extrabold text-blue-400 truncate max-w-[120px]"
          >{{ msg.playerName }}:</span
        >
        <span class="text-slate-200 break-all">{{ msg.text }}</span>
      </div>
    </div>
  </div>

  <!-- Guess Form -->
  <form
    (submit)="onSend(); $event.preventDefault()"
    class="p-3 bg-slate-800 border-t border-slate-700 flex gap-2"
  >
    <input
      type="text"
      [(ngModel)]="currentGuess"
      name="guessInput"
      placeholder="Nhập dự đoán của bạn..."
      autocomplete="off"
      class="flex-1 px-4 py-2.5 rounded-xl bg-slate-900 border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:ring-1 focus:ring-blue-500 transition-all text-sm"
    />
    <button
      type="submit"
      class="px-4 py-2 bg-blue-600 hover:bg-blue-500 active:scale-95 transition-all text-white text-sm font-semibold rounded-xl cursor-pointer"
    >
      Đoán
    </button>
  </form>
</div>

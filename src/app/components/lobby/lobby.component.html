<div
  class="lobby-viewport w-full max-w-5xl mx-auto flex flex-col justify-between h-[92dvh] text-white p-6 md:p-8 relative select-none border-4 border-white/10 rounded-lg bg-white/5 shadow-2xl"
>
  <!-- Header row: Language Selector & Badge -->
  <div class="flex items-center justify-between w-full mb-3">
    <div class="flex flex-col gap-2">
      <!-- Language selector button -->
      <!-- <button class="lang-btn flex items-center gap-2 px-3 py-1.5 rounded-xl border border-slate-700 bg-slate-900/50 hover:bg-slate-900 transition-all font-bold text-xs uppercase cursor-pointer">
        <span class="text-sm">🌐</span> VI
      </button> -->

      <!-- Sports Stars Badge -->
      <div
        class="stars-badge flex flex-col items-center p-1.5 rounded-2xl bg-gradient-to-r from-cyan-500 via-yellow-500 to-red-500 shadow-lg border-2 border-white rotate-[-3deg] hover:rotate-0 transition-transform duration-200"
      >
        <span class="text-[12px] font-black text-slate-950 uppercase tracking-widest leading-none"
          >Vẽ và đoán</span
        >
        <span class="text-[8px] font-bold text-white tracking-wider leading-none mt-0.5"
          >Thử thách tình bạn</span
        >
      </div>
    </div>

    <!-- Center Logo -->
    <div class="flex flex-col items-center">
      <div class="gartic-logo-container flex flex-col items-center rotate-[-1deg]">
        <div
          class="logo-shield bg-slate-950 px-7 py-2.5 rounded-[2rem] border-[4px] border-slate-900 shadow-2xl flex flex-col items-center relative"
        >
          <!-- Sparkles -->
          <span class="absolute top-1.5 left-4 text-xs animate-pulse">⚡</span>
          <span class="absolute bottom-1.5 right-4 text-xs animate-pulse">✨</span>

          <span
            class="text-xl font-black italic tracking-wider text-pink-500 uppercase drop-shadow-[0_2px_0_rgba(0,0,0,1)] leading-none"
          >
            P
          </span>
          <span
            class="text-4xl font-black tracking-wide text-white uppercase drop-shadow-[0_4px_0_rgba(0,0,0,1)] leading-none mt-1 flex items-center gap-0.5"
          >
            Gu<span
              class="logo-o w-7 h-7 border-[4px] border-dashed border-white rounded-full inline-flex items-center justify-center animate-spin-slow text-xl pb-1"
              >e</span
            >ss
          </span>
        </div>
        <span
          class="subtitle-text text-yellow-400 font-extrabold text-xs tracking-widest mt-1.5 uppercase drop-shadow-[0_2px_0_rgba(0,0,0,1)]"
        >
          Tam Sao Thất Bản
        </span>
      </div>
    </div>

    <!-- Empty right side to balance header spacing -->
    <div class="w-16 h-16"></div>
  </div>

  <!-- Primary Cards Row -->
  <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-stretch w-full my-auto">
    <!-- Left Panel: Profile Setup Card (Col: 7) -->
    <div
      class="lg:col-span-7 flex flex-col border-4 border-white/10 rounded-2xl overflow-hidden shadow-2xl backdrop-blur-md"
    >
      <!-- Card Header Banner -->
      <div class="flex border-b-4 border-white/10 bg-slate-950/40 py-4 justify-center items-center">
        <span class="text-sm font-black uppercase tracking-widest text-green-400">
          Hồ Sơ Của Bạn
        </span>
      </div>

      <!-- Card Body -->
      <div class="p-7 flex-1 flex flex-col justify-between space-y-6">
        <div class="flex flex-col md:flex-row items-center gap-6">
          <!-- Avatar Block -->
          <div class="relative group cursor-pointer" (click)="randomizeAvatar()">
            <div
              class="avatar-frame w-28 h-28 rounded-full border-4 border-purple-500 bg-slate-800 flex items-center justify-center p-3 shadow-lg group-hover:scale-105 transition-all relative overflow-hidden"
            >
              <img
                [src]="'/assets/user-logo/' + currentAvatar"
                alt="Avatar"
                class="w-full h-full object-contain"
              />
            </div>
            <!-- Randomize Badge -->
            <button
              class="absolute bottom-0 right-0 w-9 h-9 bg-green-500 hover:bg-green-400 border-2 border-white rounded-full flex items-center justify-center shadow-lg group-hover:rotate-180 transition-all duration-300 cursor-pointer"
            >
              <svg lucideRefreshCw class="w-4 h-4 text-white"></svg>
            </button>
          </div>

          <!-- Name & Room Configs -->
          <div class="flex-1 w-full space-y-3">
            <div class="space-y-1.5">
              <label class="block text-xs font-extrabold tracking-wide text-purple-200 uppercase"
                >Nhân vật & biệt danh</label
              >
              <input
                type="text"
                [(ngModel)]="nickname"
                class="w-full px-4 py-3 rounded-xl bg-purple-950/30 border-2 border-purple-800/60 text-white placeholder-purple-800/40 font-bold text-base focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500 transition-all shadow-inner"
                placeholder="Nhập biệt danh..."
              />
            </div>

            <!-- Join Room Section -->
            <div class="space-y-1.5 pt-1">
              <label class="block text-xs font-extrabold tracking-wide text-purple-200 uppercase"
                >Hoặc nhập Mã phòng để tham gia</label
              >
              <div class="flex gap-2">
                <input
                  type="text"
                  [(ngModel)]="roomIdToJoin"
                  class="flex-1 px-4 py-2.5 rounded-xl bg-purple-950/30 border-2 border-purple-800/60 text-white placeholder-purple-800/40 font-bold text-sm focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500 transition-all shadow-inner uppercase"
                  placeholder="MÃ PHÒNG (VD: ABCXYZ)..."
                />
                <button
                  (click)="onJoinRoom()"
                  class="px-5 py-2.5 bg-green-500 hover:bg-green-600 text-white font-extrabold text-xs rounded-xl active:scale-95 transition-all cursor-pointer shadow-md uppercase tracking-wider"
                >
                  Tham gia
                </button>
              </div>
            </div>

            <!-- Mini Settings panel (Mode, Bots, Time) inside card -->
            <div class="grid grid-cols-2 gap-4 pt-1">
              <div class="space-y-1.5 flex flex-col justify-end">
                <label class="block text-xs font-extrabold tracking-wide text-purple-200 uppercase"
                  >Chế độ chơi</label
                >
                <select
                  [(ngModel)]="selectedMode"
                  class="w-full px-3 py-2.5 rounded-xl bg-purple-950/40 border-2 border-purple-800/60 text-sm font-bold text-white focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500 transition-all cursor-pointer shadow-inner"
                >
                  <option value="A" class="bg-purple-950 text-white">Chế độ A: Skribbl</option>
                  <option value="B" class="bg-purple-950 text-white">Chế độ B: Ice Breaker</option>
                </select>
              </div>

              <div class="space-y-1.5 flex flex-col justify-end">
                <label class="block text-xs font-extrabold tracking-wide text-purple-200 uppercase"
                  >Thời gian vẽ</label
                >
                <select
                  [(ngModel)]="drawTimeLimit"
                  class="w-full px-3 py-2.5 rounded-xl bg-purple-950/40 border-2 border-purple-800/60 text-sm font-bold text-white focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500 transition-all cursor-pointer shadow-inner"
                >
                  <option [value]="30" class="bg-purple-950 text-white">30 Giây</option>
                  <option [value]="60" class="bg-purple-950 text-white">60 Giây</option>
                  <option [value]="90" class="bg-purple-950 text-white">90 Giây</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <!-- Big Play Button -->
        <div class="flex justify-center pt-2">
          <button
            (click)="roomIdToJoin ? onJoinRoom() : onCreateRoom()"
            class="play-btn px-10 py-3 bg-white hover:bg-slate-100 font-black text-purple-950 text-lg rounded-full shadow-2xl active:scale-95 transition-all cursor-pointer flex items-center gap-2.5 border-b-6 border-purple-300 shadow-purple-900/30"
          >
            <svg lucidePlay class="w-6 h-6 text-green-500 fill-green-500"></svg> 
            {{ roomIdToJoin ? 'THAM GIA PHÒNG' : 'BẮT ĐẦU' }}
          </button>
        </div>
      </div>
    </div>

    <!-- Right Panel: How to Play Carousel (Col: 5) -->
    <div
      class="lg:col-span-5 flex flex-col border-4 border-white/10 rounded-2xl overflow-hidden shadow-2xl p-6 backdrop-blur-md justify-between items-center text-center"
    >
      <!-- Tutorial Title -->
      <span class="text-xs uppercase tracking-widest text-green-400 font-black">Cách chơi</span>

      <!-- Step illustration -->
      <div
        class="my-2 w-full max-w-[170px] aspect-square flex items-center justify-center relative"
      >
        <img
          [src]="'/assets/ilust_png/' + carouselSteps[activeCarouselIndex].image"
          alt="Illustration"
          class="w-full h-full object-contain filter drop-shadow-[0_8px_16px_rgba(0,0,0,0.4)]"
        />
      </div>

      <!-- Description Block -->
      <div class="space-y-1 px-2 min-h-[75px]">
        <h4 class="text-base font-black text-slate-100 uppercase tracking-wider">
          {{ carouselSteps[activeCarouselIndex].title }}
        </h4>
        <p class="text-xs text-slate-200 leading-relaxed font-semibold">
          {{ carouselSteps[activeCarouselIndex].desc }}
        </p>
      </div>

      <!-- Carousel Navigators -->
      <div class="flex items-center justify-center gap-4 mt-2 w-full">
        <!-- Left Arrow -->
        <button
          (click)="prevCarousel()"
          class="w-8 h-8 rounded-full border border-slate-700 bg-slate-900/60 hover:bg-slate-900 active:scale-90 transition-all flex items-center justify-center text-sm font-black text-slate-300 hover:text-white cursor-pointer"
        >
          <svg lucideChevronLeft class="w-4 h-4"></svg>
        </button>

        <!-- Dot indicators -->
        <div class="flex items-center gap-2.5 justify-center py-1">
          <span
            *ngFor="let step of carouselSteps; let idx = index"
            [ngClass]="{
              'w-3 h-3 bg-white border-2 border-green-500 ring-4 ring-green-500/25 scale-110':
                idx === activeCarouselIndex,
              'w-2 h-2 bg-purple-300/40 hover:bg-purple-200/60': idx !== activeCarouselIndex,
            }"
            (click)="activeCarouselIndex = idx"
            class="rounded-full transition-all cursor-pointer"
          >
          </span>
        </div>

        <!-- Right Arrow -->
        <button
          (click)="nextCarousel()"
          class="w-8 h-8 rounded-full border border-slate-700 bg-slate-900/60 hover:bg-slate-900 active:scale-90 transition-all flex items-center justify-center text-sm font-black text-slate-300 hover:text-white cursor-pointer"
        >
          <svg lucideChevronRight class="w-4 h-4"></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Footer row: Game links & developer info -->
  <div
    class="flex flex-col md:flex-row items-center justify-between w-full pt-4 border-t border-purple-900/20 text-slate-200 text-xs font-semibold mt-4 gap-3"
  >
    <span class="text-sm font-black text-white italic tracking-wider flex items-center gap-1">
      <span class="text-pink-500 font-extrabold">P</span>guess
    </span>

    <!-- Central links -->
    <div
      class="flex flex-wrap items-center justify-center gap-3 text-center md:text-left text-slate-200"
    >
      <a href="#" class="hover:text-white transition-colors">ĐIỀU KHOẢN SỬ DỤNG</a>
      <span>|</span>
      <a href="#" class="hover:text-white transition-colors">QUYỀN RIÊNG TƯ</a>
      <span>|</span>
      <a href="#" class="hover:text-white transition-colors">TÀI SẢN</a>
      <span>|</span>
      <a href="#" class="hover:text-white transition-colors">BLOG</a>
      <span>|</span>
      <a href="#" class="hover:text-white transition-colors">LIÊN HỆ</a>
      <span>|</span>
      <!-- Social icons -->
      <div class="flex items-center gap-3.5 ml-1 text-white">
        <a
          href="#"
          class="hover:opacity-80 transition-opacity flex items-center justify-center"
          title="Music"
        >
          <svg lucideMusic class="w-4 h-4"></svg>
        </a>
        <a
          href="#"
          class="hover:opacity-80 transition-opacity flex items-center justify-center"
          title="Video"
        >
          <svg lucideVideo class="w-4 h-4"></svg>
        </a>
        <a
          href="#"
          class="hover:opacity-80 transition-opacity flex items-center justify-center"
          title="Chat"
        >
          <svg lucideMessageSquare class="w-4 h-4"></svg>
        </a>
        <a
          href="#"
          class="hover:opacity-80 transition-opacity flex items-center justify-center"
          title="Gallery"
        >
          <svg lucideCamera class="w-4 h-4"></svg>
        </a>
      </div>
    </div>
  </div>
</div>
